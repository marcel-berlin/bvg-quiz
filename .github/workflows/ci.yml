name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  astro-check:
    name: astro check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm astro check

  eslint-a11y:
    name: eslint a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm eslint . --max-warnings=0

  build:
    name: build success
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Schema test (D-14) + package-grep test (SETUP-05 tripwire)
        run: pnpm vitest run
      - name: Astro build (Zod content collection validation runs here)
        run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  privacy-smoke:
    name: privacy smoke test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: pnpm dlx playwright install --with-deps chromium
      - run: pnpm playwright test tests/privacy-smoke.spec.ts
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse-ci:
    name: lighthouse-ci
    runs-on: ubuntu-latest
    needs: privacy-smoke
    # Only runs on the public repo where Vercel preview deploys exist.
    # Private repo (marcel-berlin/bvg-quiz-private) has no Vercel integration —
    # patrickedqvist/wait-for-vercel-preview would time out at 180s there.
    if: github.event_name == 'pull_request' && github.repository == 'marcel-berlin/bvg-quiz'
    steps:
      - uses: actions/checkout@v6
      - name: Wait for Vercel preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 180
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.vercel.outputs.url }}
            ${{ steps.vercel.outputs.url }}/en/
          configPath: ./lighthouserc.json
          uploadArtifacts: true
